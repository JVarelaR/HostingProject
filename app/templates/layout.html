<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}{% endblock %} | Hosting</title>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-900">

    <!-- Barra de Navegación -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <i class="fas fa-server text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Hosting</span>
                </div>

                <!-- Usuario arriba a la derecha -->
                <div class="flex items-center gap-3 border-l border-slate-200 pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-bold text-slate-900 uppercase">Usuario1</p>
                    </div>
                    <img class="h-8 w-8 rounded-full border border-slate-300" 
                         src="https://ui-avatars.com/api/?name=Usuario1" 
                         alt="User profile">
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Pie de página -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 md:flex md:items-center md:justify-between">
            <div class="flex justify-center space-x-6 md:order-2">
                <a href="#" class="text-slate-400 hover:text-slate-500 text-sm">Repositorio</a>
                <a href="#" class="text-slate-400 hover:text-slate-500 text-sm">Demostración</a>
                <a href="#" class="text-slate-400 hover:text-slate-500 text-sm">Documentación</a>
            </div>
            <div class="mt-4 md:mt-0 md:order-1 text-center md:text-left">
                <p class="text-sm text-slate-400">&copy; Hosting.</p>
            </div>
        </div>
    </footer>

</body>

</html>
