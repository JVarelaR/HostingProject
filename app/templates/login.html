{% extends 'layout.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="min-h-screen bg-slate-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="p-8">
            <!-- Encabezado -->
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Bienvenido</h1>
                <p class="mt-2 text-slate-500 text-sm">Ingresa tus credenciales para acceder</p>
            </div>

            <form id="login-form" method="POST" action="/login" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Correo electrónico</label>
                    <input type="email" name="email" id="email" placeholder="correo@ejemplo.com" value="{{ emailForm or '' }}" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="text-sm font-semibold text-slate-700">Contraseña</label>
                    </div>
                    <input type="password" name="password" id="password" placeholder="••••••••" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Botón de Login -->
                <div class="pt-2">
                    <button id="login-submit" type="submit" 
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                        Entrar al Panel
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Enlace a Registro -->
            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-600">
                    ¿No tienes una cuenta todavía? 
                    <a href="/register" class="text-blue-600 font-bold hover:text-blue-700 transition-colors">
                        Regístrate aquí
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
<script>
    // Deshabilitar el botón de submit al enviar el formulario para evitar envíos múltiples
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('login-form');
        const submit = document.getElementById('login-submit');

        if (!form || !submit) {
            return;
        }

        form.addEventListener('submit', function () {
            submit.disabled = true;
            submit.classList.add('opacity-70', 'cursor-not-allowed');
            submit.innerHTML = 'Procesando...';
        });
    });
</script>
{% endblock %}
