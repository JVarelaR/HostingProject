{% extends 'layout.html' %}

{% block title %}Registrarse{% endblock %}

{% block content %}
<div class="min-h-screen bg-slate-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="p-8">
            <!-- Encabezado -->
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Crear cuenta</h1>
                <p class="mt-2 text-slate-500 text-sm">Regístrate para gestionar tus proyectos</p>
            </div>

            <form id="register-form" method="POST" action="/register" class="space-y-5">
                <!-- Nombre de Usuario -->
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-1">Nombre de usuario</label>
                    <input type="text" name="username" id="username" placeholder="Tu usuario" value="{{ usernameForm or '' }}" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">Correo electrónico</label>
                    <input type="email" name="email" id="email" placeholder="correo@ejemplo.com" value="{{ emailForm or '' }}" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required
                        class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <!-- Botón de Registro -->
                <div class="pt-2">
                    <button id="register-submit" type="submit" 
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                        Registrarse
                    </button>
                </div>
            </form>

            <!-- Enlace a Login -->
            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-600">
                    ¿Ya tienes una cuenta? 
                    <a href="/login" class="text-blue-600 font-bold hover:text-blue-700 transition-colors">
                        Inicia sesión aquí
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
<script>
    // Deshabilitar el botón de submit al enviar el formulario para evitar envíos múltiples
    document.addEventListener('DOMContentLoaded', function () {
        const form = document.getElementById('register-form');
        const submit = document.getElementById('register-submit');

        if (!form || !submit) {
            return;
        }

        form.addEventListener('submit', function () {
            submit.disabled = true;
            submit.classList.add('opacity-70', 'cursor-not-allowed');
            submit.textContent = 'Procesando...';
        });
    });
</script>
{% endblock %}
